services:
  db:
    image: postgres:16-alpine
    container_name: resume_screening_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-resume_screening_service}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_screening_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: resume_screening_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  api:
    build: .
    container_name: resume_screening_api
    restart: always
    command: >
      sh -c "npx prisma migrate deploy && npm run start:api"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/resume_screening_service
      - REDIS_HOST=redis
    volumes:
      - ./uploads:/app/uploads

  worker:
    build: .
    container_name: resume_screening_worker
    restart: always
    command: npm run start:worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/resume_screening_service
      - REDIS_HOST=redis
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
